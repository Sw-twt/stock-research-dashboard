<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>시장 뉴스 - Stock Dashboard</title>
    <link rel="stylesheet" href="css/reset.css">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <!-- Mobile Menu Overlay -->
    <div class="mobile-overlay" id="mobileOverlay"></div>

    <!-- Header -->
    <header>
        <div class="container">
            <div class="header-content">
                <div class="logo">📈 Stock Dashboard</div>

                <button class="mobile-menu-btn" id="mobileMenuBtn">☰</button>

                <nav id="mainNav">
                    <ul>
                        <li><a href="index.html">홈</a></li>
                        <li><a href="watchlist.html">관심종목</a></li>
                        <li><a href="news.html" class="active">뉴스</a></li>
                        <li><button class="theme-toggle" id="themeToggle">🌙</button></li>
                    </ul>
                </nav>
            </div>
        </div>
    </header>

    <!-- Page Header -->
    <section class="container" style="margin-top: 2rem;">
        <div class="card">
            <h1 class="card-title">시장 뉴스</h1>
            <p class="card-subtitle mb-md">최신 시장 동향과 뉴스를 확인하세요</p>

            <!-- Category Filter -->
            <div class="category-filter">
                <button class="category-btn active" data-category="general">일반</button>
                <button class="category-btn" data-category="forex">외환</button>
                <button class="category-btn" data-category="crypto">암호화폐</button>
                <button class="category-btn" data-category="merger">인수합병</button>
            </div>
        </div>
    </section>

    <!-- Main Content -->
    <main class="container">
        <div class="main-layout">
            <!-- News Feed -->
            <div class="main-content">
                <div class="card">
                    <div id="newsList" class="news-list">
                        <div class="loading">
                            <div class="loading-spinner"></div>
                            <p>뉴스를 불러오는 중...</p>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Watchlist Sidebar -->
            <aside class="sidebar">
                <div class="card">
                    <div class="card-header">
                        <h3 class="card-title">관심종목 현황</h3>
                    </div>
                    <div id="watchlistSidebar">
                        <div class="empty-state">
                            <div class="empty-state-icon">⭐</div>
                            <p class="empty-state-text">저장된 종목이 없습니다</p>
                        </div>
                    </div>
                </div>
            </aside>
        </div>
    </main>

    <!-- Footer -->
    <footer>
        <div class="container">
            <p>&copy; 2025 Stock Research Dashboard | Data by Finnhub & ExchangeRate API</p>
        </div>
    </footer>

    <script type="module" src="js/news.js"></script>
</body>
</html>
